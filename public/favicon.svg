<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E7C4" />
      <stop offset="50%" stop-color="#D1A649" />
      <stop offset="100%" stop-color="#9A7422" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111a2b" />
      <stop offset="100%" stop-color="#0B132B" />
    </linearGradient>
  </defs>
  <!-- Fondo circular premium -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-grad)" stroke="url(#gold-grad)" stroke-width="12" />
  
  <!-- Monograma elegante de la letra 'B' en estilo Serif de alta gama -->
  <text x="256" y="345" 
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif" 
        font-size="290" 
        font-weight="bold" 
        fill="url(#gold-grad)" 
        text-anchor="middle"
        letter-spacing="-5">B</text>
</svg>